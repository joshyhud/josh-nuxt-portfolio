name: Mastodon publisher

on:
  push:
    paths:
      - "src/content/blog/**/*.md"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get blog file
        id: file
        run: |
          FILE=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^src/content/blog/.*\.md' | head -n 1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Extract slug
        id: slug
        run: |
          SLUG=$(basename "${{ steps.file.outputs.file }}" .md)
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Build URL
        id: url
        run: |
          echo "url=https://josh-hudson.co.uk/blog/${{ steps.slug.outputs.slug }}" >> $GITHUB_OUTPUT

      - name: Wait for site to be live
        run: sleep 60

      - name: Mastodon Post on GitHub Actions
        id: mastodon_toot
        uses: cbrgm/mastodon-github-action@v2
        with:
          access-token: ${{ secrets.MASTODON_TOKEN }}
          url: "https://mastodon.social"
          message: ${{ steps.url.outputs.url }}

      - name: Get toot information
        run: |
          echo "Toot ID: ${{ steps.mastodon_toot.outputs.id }}"
          echo "Toot URL: ${{ steps.mastodon_toot.outputs.url }}"
          echo "Scheduled at: ${{ steps.mastodon_toot.outputs.scheduled_at }}"
