name: Mastodon publisher

on:
  push:
    paths:
      - "src/content/blog/**/*.md"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get blog file
        id: file
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            FILE=$(git log --name-only --pretty="" -n 1 "$AFTER" | grep '^src/content/blog/.*\.md' | head -n 1)
          else
            FILE=$(git diff --name-only "$BEFORE" "$AFTER" | grep '^src/content/blog/.*\.md' | head -n 1)
          fi

          if [ -z "$FILE" ]; then
            echo "No changed blog markdown file found in this push."
            exit 1
          fi

          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Extract slug
        id: slug
        run: |
          FILE="${{ steps.file.outputs.file }}"
          REL_PATH="${FILE#src/content/blog/}"
          SLUG="${REL_PATH%.md}"
          SLUG="${SLUG%/index}"

          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Build URL
        id: url
        run: |
          echo "url=https://josh-hudson.co.uk/blog/${{ steps.slug.outputs.slug }}" >> $GITHUB_OUTPUT

      - name: Extract description
        id: description
        run: |
          FILE="${{ steps.file.outputs.file }}"
          DESCRIPTION=$(sed -n '/^description:[[:space:]]*"/s/^description:[[:space:]]*"\(.*\)"/\1/p' "$FILE")
          echo "description=$DESCRIPTION" >> $GITHUB_OUTPUT

      - name: Wait for site to be live
        run: sleep 60

      - name: Mastodon Post on GitHub Actions
        id: mastodon_toot
        uses: cbrgm/mastodon-github-action@v2
        with:
          access-token: ${{ secrets.MASTODON_TOKEN }}
          url: "https://mastodon.social"
          message: |
            ${{ steps.description.outputs.description }}

            ${{ steps.url.outputs.url }}

      - name: Get toot information
        run: |
          echo "Toot ID: ${{ steps.mastodon_toot.outputs.id }}"
          echo "Toot URL: ${{ steps.mastodon_toot.outputs.url }}"
          echo "Scheduled at: ${{ steps.mastodon_toot.outputs.scheduled_at }}"
